<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow Clone</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        color: #333;
    }
    header {
        background-color: #e71a0f;
        color: white;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
    }
    .logo {
        font-size: 1.5rem;
        font-weight: bold;
    }
    nav {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    nav a:hover {
        text-decoration: underline;
    }
    .search-bar {
        display: flex;
        align-items: center;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        padding: 5px 10px;
    }
    .search-bar input {
        border: none;
        outline: none;
        padding: 5px;
        font-size: 0.9rem;
    }
    .search-bar button {
        background: #e71a0f;
        border: none;
        color: white;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 15px;
    }
    .search-bar button:hover {
        background: #c21807;
    }
    .movie-section {
        padding: 20px;
    }
    .movie-section h2 {
        margin-bottom: 15px;
    }
    .movie-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }
    .movie-card {
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: transform 0.2s ease;
    }
    .movie-card:hover {
        transform: scale(1.05);
    }
    .movie-card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
    }
    .movie-info {
        padding: 10px;
    }
    .movie-info h3 {
        margin: 0;
        font-size: 1.1rem;
    }
    .movie-info p {
        font-size: 0.9rem;
        color: #666;
    }
    .book-btn {
        display: block;
        text-align: center;
        background: #e71a0f;
        color: white;
        padding: 10px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 0 0 8px 8px;
    }
    .book-btn:hover {
        background: #c21807;
    }

    
    footer {
        background: #222;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 20px;
    }

    
    @media (max-width: 768px) {
        nav {
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-bar {
            width: 100%;
        }
    }
</style>
</head>
<body>

<header>
    <div class="logo">BookMyShow</div>
    <nav>
        <a href="#">Movies</a>
        <a href="#">Events</a>
        <a href="#">Plays</a>
        <a href="#">Sports</a>
        <a href="#">Offers</a>
    </nav>
    <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events...">
        <button>Search</button>
    </div>
</header>

<section class="movie-section">
    <h2>Now Showing</h2>
    <div class="movie-grid">
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Movie Poster">
            <div class="movie-info">
                <h3>Movie Title 1</h3>
                <p>Action | 2h 15m</p>
            </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Movie Poster">
            <div class="movie-info">
                <h3>Movie Title 2</h3>
                <p>Comedy | 1h 50m</p>
            </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Movie Poster">
            <div class="movie-info">
                <h3>Movie Title 3</h3>
                <p>Drama | 2h 5m</p>
            </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Movie Poster">
            <div class="movie-info">
                <h3>Movie Title 4</h3>
                <p>Thriller | 2h 10m</p>
            </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
    </div>
</section>

<footer>
    &copy; 2026 BookMyShow Clone | Designed by You
</footer>

</body>
</html>
