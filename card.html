<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
}

.card{
    width:350px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);

    display:flex;
    flex-direction:column;
    align-items:center;
}

.top{
    width:100%;
    height:160px;
    background:#0d99ff;
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid white;
    margin-top:-65px;
    object-fit:cover;
}

.content{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    padding:15px 25px 25px;
}

.content h2{
    color:#333;
    font-size:32px;
}

.content p{
    color:gray;
    font-size:18px;
}

.social{
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:10px;
}

.social a{
    width:42px;
    height:42px;
    border-radius:50%;
    color:white;
    text-decoration:none;

    display:flex;
    justify-content:center;
    align-items:center;
}

.fb{background:#1877f2;}
.tw{background:#1da1f2;}
.ig{background:#e1306c;}
.yt{background:#ff0000;}

.buttons{
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}

.buttons button{
    border:none;
    padding:12px 30px;
    border-radius:25px;
    background:#0d99ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.stats{
    width:100%;
    margin-top:20px;

    display:flex;
    justify-content:center;
    gap:30px;
}

.stat{
    display:flex;
    align-items:center;
    gap:8px;
    color:#666;
    font-size:18px;
}

</style>
</head>
<body>

<div class="card">

    <div class="top"></div>

    <img src="Screenshot 2026-06-02 105053.png"
     alt="Nikhil Porwal"
     class="profile">

    <div class="content">

        <h2>CodingLab</h2>
        <p>YouTuber & Blogger</p>

        <div class="social">
            <a href="#" class="fb">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="#" class="tw">
                <i class="fab fa-twitter"></i>
            </a>

            <a href="#" class="ig">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="#" class="yt">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

        <div class="buttons">
            <button>Subscribe</button>
            <button>Message</button>
        </div>

        <div class="stats">

            <div class="stat">
                <i class="far fa-heart"></i>
                <span>60.4k</span>
            </div>

            <div class="stat">
                <i class="far fa-comment"></i>
                <span>20k</span>
            </div>

            <div class="stat">
                <i class="fas fa-share"></i>
                <span>12.4k</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
