<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter N</title>

<style>
.container{
    display:grid;
    grid-template-columns:repeat(7,60px);
    grid-template-rows:repeat(7,60px);
    gap:10px;
    justify-content:center;
    margin-top:50px;
}

.box{
    border:5px solid rgb(4, 4, 5);
}
.item1{
    grid-column:1;
    grid-row:1;
}
.item2{
    grid-column:1;
    grid-row:2;
}
.item3{
    grid-column:1;
    grid-row:3;
}
.item4{
    grid-column:1;
    grid-row:4;
}
.item5{
    grid-column:1;
    grid-row:5;
}
.item6{
    grid-column:1;
    grid-row:6;
}
.item7{
    grid-column:1;
    grid-row:7;
}
.item8{
    grid-column:2;
    grid-row:2;
}
.item9{
    grid-column:3;
    grid-row:3;
}
.item10{
    grid-column:4;
    grid-row:4;
}
.item11{
    grid-column:5;
    grid-row:5;
}
.item12{
    grid-column:6;
    grid-row:6;
}
.item13{
    grid-column:7;
    grid-row:1;
}
.item14{
    grid-column:7;
    grid-row:2;
}
.item15{
    grid-column:7;
    grid-row:3;
}
.item16{
    grid-column:7;
    grid-row:4;
}
.item17{
    grid-column:7;
    grid-row:5;
}
.item18{
    grid-column:7;
    grid-row:6;
}
.item19{
    grid-column:7;
    grid-row:7;
}
</style>
</head>
<body>

<div class="container">
    <div class="box item1"></div>
    <div class="box item2"></div>
    <div class="box item3"></div>
    <div class="box item4"></div>
    <div class="box item5"></div>
    <div class="box item6"></div>
    <div class="box item7"></div>
    <div class="box item8"></div>
    <div class="box item9"></div>
    <div class="box item10"></div>
    <div class="box item11"></div>
    <div class="box item12"></div>
    <div class="box item13"></div>
    <div class="box item14"></div>
    <div class="box item15"></div>
    <div class="box item16"></div>
    <div class="box item17"></div>
    <div class="box item18"></div>
    <div class="box item19"></div>
</div>

</body>
</html>
