<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Human Made Layout</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f5f5f5;
      font-family:Arial, sans-serif;
      padding:20px;
    }

    .container{
      width:100%;
    }

    /* NAVBAR */

    .navbar{
      height:75px;
      background:white;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px;
      margin-bottom:20px;
      border:1px solid #ddd;
    }

    .logo{
      width:160px;
      height:40px;
      background:#e0e0e0;
      border-radius:8px;
    }

    .search{
      width:50%;
      height:40px;
      background:#ededed;
      border-radius:8px;
    }

    .menu{
      width:220px;
      height:40px;
      background:#e0e0e0;
      border-radius:8px;
    }

    /* SEARCH BAR */

    .top-box{
      width:100%;
      height:70px;
      background:white;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:20px;
    }

    /* TAG / PILL LIST */
    .tag-list{
      margin-bottom:20px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      background:#111111;
      border-radius:999px;
      overflow:hidden;
    }

    .tag-scroller{
      display:flex;
      gap:12px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:6px;
    }

    .tag-scroller::-webkit-scrollbar{ display:none; }

    .tag-pill{
      flex:0 0 auto;
      padding:8px 14px;
      background:#2a2a2a;
      color:#fff;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;
      white-space:nowrap;
    }

    .tag-pill.active{
      background:#fff;
      color:#111;
      box-shadow:0 6px 18px rgba(0,0,0,0.25);
    }

    .tag-more{
      margin-left:auto;
      flex:0 0 auto;
      background:transparent;
      border:none;
      color:#fff;
      font-size:18px;
      width:44px;
      height:44px;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
    }

    /* BANNER SECTION */

    .banner-section{
      display:flex;
      gap:20px;
      margin-bottom:20px;
    }

    .left-banner{
      width:40%;
      height:280px;
      background:#dcdcdc;
      border-radius:10px;
    }

    .center-banner{
      width:40%;
      height:280px;
      background:#e4e4e4;
      border-radius:10px;
    }

    .right-banner{
      width:20%;
      height:280px;
      background:#d6d6d6;
      border-radius:10px;
    }

    

    .products{
      display:flex;
      gap:20px;
      margin-bottom:20px;
    }

    .card{
      flex:1;
      height:220px;
      background:white;
      border-radius:10px;
      border:1px solid #ddd;
      padding:10px;
    }

    .card-inner{
      width:100%;
      height:100%;
      background:#efefef;
      border-radius:8px;
    }

    /* FOOTER */

    .footer{
      width:100%;
      height:100px;
      background:white;
      border-radius:10px;
      border:1px solid #ddd;
    }

    /* MOBILE */

    @media(max-width:768px){

      .navbar{
        flex-direction:column;
        height:auto;
        gap:10px;
      }

      .logo,
      .search,
      .menu{
        width:100%;
      }

      .banner-section{
        flex-direction:column;
      }

      .left-banner,
      .center-banner,
      .right-banner{
        width:100%;
      }

      .products{
        flex-direction:column;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- NAVBAR -->

    <div class="navbar">

      <div class="logo"></div>

      <div class="search"></div>

      <div class="menu"></div>

    </div>

    <!-- TAG / PILL LIST -->
    <div class="tag-list" aria-label="Tags">
      <div class="tag-scroller">
        <button class="tag-pill active">All</button>
        <button class="tag-pill">Dubbing</button>
        <button class="tag-pill">Bhavya Gandhi</button>
        <button class="tag-pill">Masala films</button>
        <button class="tag-pill">Gaming</button>
        <button class="tag-pill">Podcasts</button>
        <button class="tag-pill">Music</button>
        <button class="tag-pill">News</button>
        <button class="tag-pill">ACP Pradyuman</button>
        <button class="tag-pill">Romantic comedies</button>
        <button class="tag-pill">Ajay Devgn</button>
        <button class="tag-pill">Comedy clubs</button>
      </div>
      <button class="tag-more" aria-hidden="true">›</button>
    </div>

    <!-- TOP SECTION -->

    <div class="top-box"></div>

    <!-- BANNERS -->

    <div class="banner-section">

      <div class="left-banner"></div>

      <div class="center-banner"></div>

      <div class="right-banner"></div>

    </div>

    <!-- PRODUCT CARDS -->

    <div class="products">

      <div class="card">
        <div class="card-inner"></div>
      </div>

      <div class="card">
        <div class="card-inner"></div>
      </div>

      <div class="card">
        <div class="card-inner"></div>
      </div>

      <div class="card">
        <div class="card-inner"></div>
      </div>

    </div>

    <!-- FOOTER -->

    <div class="footer"></div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const pills = document.querySelectorAll('.tag-pill');
      pills.forEach(p => p.addEventListener('click', () => {
        pills.forEach(x => x.classList.remove('active'));
        p.classList.add('active');
      }));

      const scroller = document.querySelector('.tag-scroller');
      const more = document.querySelector('.tag-more');
      if(more && scroller){
        more.addEventListener('click', () => scroller.scrollBy({ left: 240, behavior: 'smooth' }));
      }
    });
  </script>

</body>
</html>
